name: Build Mac App

on:
  push:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          make

      - name: Package
        run: |
          codesign --force --deep --sign - build/RobloxPiano.app
          cd build
          zip -r RobloxPiano.zip RobloxPiano.app

      - name: Publish latest release
        run: |
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          gh release create latest build/RobloxPiano.zip \
            --title "Roblox Piano (macOS)" \
            --notes "Double-click RobloxPiano.app to open. First launch: right-click → Open to bypass Gatekeeper. Then add Terminal to Accessibility in System Settings → Privacy & Security." \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
