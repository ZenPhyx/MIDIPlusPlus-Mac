name: Build Snuffiano

on:
  push:
  workflow_dispatch:

jobs:
  # ── macOS ────────────────────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build icon
        run: |
          if [ -f assets/icon.png ]; then
            mkdir -p assets/AppIcon.iconset
            sips -z 16   16   assets/icon.png --out assets/AppIcon.iconset/icon_16x16.png
            sips -z 32   32   assets/icon.png --out assets/AppIcon.iconset/icon_16x16@2x.png
            sips -z 32   32   assets/icon.png --out assets/AppIcon.iconset/icon_32x32.png
            sips -z 64   64   assets/icon.png --out assets/AppIcon.iconset/icon_32x32@2x.png
            sips -z 128  128  assets/icon.png --out assets/AppIcon.iconset/icon_128x128.png
            sips -z 256  256  assets/icon.png --out assets/AppIcon.iconset/icon_128x128@2x.png
            sips -z 256  256  assets/icon.png --out assets/AppIcon.iconset/icon_256x256.png
            sips -z 512  512  assets/icon.png --out assets/AppIcon.iconset/icon_256x256@2x.png
            sips -z 512  512  assets/icon.png --out assets/AppIcon.iconset/icon_512x512.png
            sips -z 1024 1024 assets/icon.png --out assets/AppIcon.iconset/icon_512x512@2x.png
            iconutil -c icns assets/AppIcon.iconset -o assets/AppIcon.icns
            echo "ICON_FLAG=-DAPP_ICON=ON" >> $GITHUB_ENV
          else
            echo "ICON_FLAG=" >> $GITHUB_ENV
          fi

      - name: Configure & build
        run: |
          cmake -B build $ICON_FLAG
          cmake --build build

      - name: Package
        run: |
          codesign --force --deep --sign - build/Snuffiano.app
          cd build && zip -r Snuffiano-macOS.zip Snuffiano.app

      - name: Create release and upload macOS build
        run: |
          cat > notes.md << 'EOF'
          ## Download

          **macOS:** Download Snuffiano-macOS.zip, unzip, right-click → Open to bypass Gatekeeper.
          Then add Terminal to Accessibility: System Settings → Privacy & Security → Accessibility.

          **Windows:** Download Snuffiano-Windows.zip, unzip, run Snuffiano.exe.
          EOF
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          gh release create latest build/Snuffiano-macOS.zip \
            --title "Snuffiano" \
            --notes-file notes.md \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-mac          # wait so the release already exists
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure & build
        run: |
          cmake -B build -A x64
          cmake --build build --config Release

      - name: Package
        run: |
          New-Item -ItemType Directory -Force build\pkg
          Copy-Item build\Release\Snuffiano.exe build\pkg\
          Compress-Archive -Path build\pkg\* -DestinationPath build\Snuffiano-Windows.zip

      - name: Upload Windows build to release
        run: gh release upload latest build/Snuffiano-Windows.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
