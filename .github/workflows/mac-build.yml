name: Build Mac App

on:
  push:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          make

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: RobloxPiano
          path: build/RobloxPiano